<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔲 QR Etiquetas — Brillitos Store</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #fdf0f6; min-height: 100vh; }

  .topbar {
    background: linear-gradient(135deg, #c2185b, #e91e8c);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 2px 10px rgba(194,24,91,0.3);
  }
  .topbar h1 { font-size: 18px; font-weight: 800; flex: 1; }
  .topbar span { font-size: 13px; opacity: .85; }

  .controls {
    background: white;
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 2px solid #f8bbd0;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .controls input {
    flex: 1; min-width: 180px;
    padding: 9px 14px;
    border: 2px solid #f8bbd0;
    border-radius: 20px;
    font-size: 13px;
    outline: none;
    transition: border .2s;
  }
  .controls input:focus { border-color: #c2185b; }

  .btn {
    padding: 9px 18px;
    border-radius: 20px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: #c2185b; color: white; }
  .btn-primary:hover { background: #ad1457; }
  .btn-secondary { background: #fce4ec; color: #c2185b; }
  .btn-secondary:hover { background: #f8bbd0; }
  .btn:disabled { opacity: .5; cursor: default; }

  #estado {
    font-size: 13px;
    color: #666;
    margin-left: 4px;
  }

  /* GRID PREVIEW */
  .preview-wrap {
    padding: 20px;
    max-width: 960px;
    margin: 0 auto;
  }
  .preview-title {
    font-size: 12px;
    font-weight: 700;
    color: #c2185b;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 14px;
  }
  #qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .qr-card {
    background: white;
    border: 2px solid #f8bbd0;
    border-radius: 12px;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: box-shadow .15s;
  }
  .qr-card:hover { box-shadow: 0 4px 14px rgba(194,24,91,.18); }
  .qr-card img { width: 90px; height: 90px; border-radius: 8px; }
  .qr-card .name { font-size: 11px; font-weight: 700; text-align: center; color: #333; line-height: 1.3; }
  .qr-card .price { font-size: 15px; font-weight: 900; color: #c2185b; }

  .empty { text-align: center; color: #bbb; font-size: 14px; padding: 40px; grid-column: 1/-1; }
  .loading { text-align: center; padding: 40px; color: #c2185b; font-size: 15px; grid-column: 1/-1; }
</style>
</head>
<body>

<div class="topbar">
  <h1>🔲 QR Etiquetas — Brillitos Store</h1>
  <span id="total-productos">Cargando...</span>
</div>

<div class="controls">
  <input id="filtro" placeholder="🔍 Filtrar productos..." oninput="filtrar()">
  <button class="btn btn-secondary" onclick="imprimirHojas()">🖨️ Imprimir</button>
  <button class="btn btn-primary" id="btn-pdf" onclick="generarPDF()">📄 Descargar PDF Carta</button>
  <span id="estado"></span>
</div>

<div class="preview-wrap">
  <div class="preview-title">Vista previa — toca para ver individual</div>
  <div id="qr-grid"><div class="loading">⏳ Cargando productos...</div></div>
</div>

<script>
const SB  = "https://xavqokyzdmqzguicjsrq.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdnFva3l6ZG1xemd1aWNqc3JxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDAwNzUsImV4cCI6MjA5MjAxNjA3NX0.hiUCfH_SXYGO-JelO3HSRmq5PZUcMw_XrYq9WaDo_eU";

let todosProductos = [];
let listaFiltrada  = [];

function codigoProd(id){ return 'BRILL-' + id; }
function qrUrl(id, size){ return 'https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&color=c2185b&data='+encodeURIComponent(codigoProd(id)); }

async function cargarProductos(){
  try {
    const r = await fetch(SB+'/rest/v1/productos?activo=eq.true&order=nombre.asc&select=id,nombre,precio,categoria', {
      headers:{ apikey: KEY, Authorization: 'Bearer '+KEY }
    });
    if(!r.ok) throw new Error(r.status);
    const data = await r.json();
    todosProductos = data || [];
    listaFiltrada  = [...todosProductos];
    document.getElementById('total-productos').textContent = todosProductos.length + ' productos';
    renderGrid();
  } catch(e) {
    document.getElementById('qr-grid').innerHTML = '<div class="empty">❌ Error cargando productos: '+e.message+'</div>';
  }
}

function filtrar(){
  const q = document.getElementById('filtro').value.toLowerCase();
  listaFiltrada = todosProductos.filter(p => (p.nombre||'').toLowerCase().includes(q));
  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('qr-grid');
  if(!listaFiltrada.length){
    grid.innerHTML = '<div class="empty">Sin productos</div>';
    return;
  }
  grid.innerHTML = listaFiltrada.map(p =>
    `<div class="qr-card">
      <img src="${qrUrl(p.id,90)}" alt="QR" loading="lazy">
      <div class="name">${p.nombre}</div>
      <div class="price">$${parseFloat(p.precio||0).toFixed(2)}</div>
    </div>`
  ).join('');
}

// ─── GENERAR PDF ───────────────────────────────────────────────────────────
async function generarPDF(){
  const btn = document.getElementById('btn-pdf');
  const estado = document.getElementById('estado');
  btn.disabled = true;
  btn.textContent = '⏳ Generando...';

  try {
    const { jsPDF } = window.jspdf;
    // Hoja carta: 215.9 x 279.4 mm
    const doc = new jsPDF({ unit:'mm', format:'letter' });

    // Dimensiones: 2.5 pulgadas = 63.5mm
    // 3 columnas × 4 filas = 12 por hoja
    const COLS = 3, ROWS = 4;
    const W = 63.5, H = 65;
    const MARGINX = (215.9 - COLS*W) / (COLS+1);
    const MARGINY = (279.4 - ROWS*H) / (ROWS+1);
    const QR_SIZE = 44;
    const QR_X_OFF = (W - QR_SIZE) / 2;
    const QR_Y_OFF = 4;

    const total = listaFiltrada.length;

    for(let i = 0; i < total; i++){
      const col      = i % COLS;
      const totalRow = Math.floor(i / COLS);
      const pageRow  = totalRow % ROWS;

      if(i > 0 && col === 0 && pageRow === 0) doc.addPage('letter');

      estado.textContent = `${i+1}/${total}`;

      const p = listaFiltrada[i];
      const x = MARGINX + col * (W + MARGINX);
      const y = MARGINY + pageRow * (H + MARGINY);

      // Fondo blanco + borde rosa redondeado
      doc.setFillColor(255, 255, 255);
      doc.setDrawColor(210, 160, 210);
      doc.setLineWidth(0.5);
      doc.roundedRect(x, y, W, H, 3, 3, 'FD');

      // QR
      const qrSrc = qrUrl(p.id, 400);
      await new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function(){
          try {
            const cv = document.createElement('canvas');
            cv.width = 400; cv.height = 400;
            const ctx = cv.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0,0,400,400);
            ctx.drawImage(img,0,0,400,400);
            doc.addImage(cv.toDataURL('image/png'), 'PNG', x+QR_X_OFF, y+QR_Y_OFF, QR_SIZE, QR_SIZE);
          } catch(e){}
          resolve();
        };
        img.onerror = resolve;
        img.src = qrSrc;
      });

      // Nombre
      const nombreBase = y + QR_Y_OFF + QR_SIZE + 4;
      doc.setFontSize(7.5);
      doc.setFont('helvetica','bold');
      doc.setTextColor(60,60,60);
      const lines = doc.splitTextToSize(p.nombre, W - 6).slice(0,2);
      doc.text(lines, x + W/2, nombreBase, { align:'center' });

      // Precio GRANDE
      const precioBase = nombreBase + lines.length * 4 + 3;
      doc.setFontSize(18);
      doc.setFont('helvetica','bold');
      doc.setTextColor(180, 30, 100);
      doc.text('$' + parseFloat(p.precio||0).toFixed(2), x + W/2, precioBase, { align:'center' });

      doc.setTextColor(0,0,0);
    }

    doc.save('brillitos_qr_etiquetas.pdf');
    estado.textContent = '✅ Listo';
    setTimeout(()=>{ estado.textContent=''; },3000);

  } catch(e){
    alert('Error generando PDF: '+e.message);
    estado.textContent = '';
  }

  btn.disabled = false;
  btn.textContent = '📄 Descargar PDF Carta';
}

// ─── IMPRIMIR DIRECTO ──────────────────────────────────────────────────────
function imprimirHojas(){
  const win = window.open('','_blank');
  win.document.write(`<html><head><title>QR Brillitos</title><style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:sans-serif;background:#fff}
    @page{size:letter;margin:8mm}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4mm;padding:0}
    .item{display:flex;flex-direction:column;align-items:center;border:1px solid #e0aacc;border-radius:5mm;padding:4mm;break-inside:avoid}
    .item img{width:44mm;height:44mm}
    .name{font-size:7pt;font-weight:700;text-align:center;margin-top:2mm;color:#333;line-height:1.3}
    .price{font-size:16pt;font-weight:900;color:#c2185b;margin-top:1mm}
  </style></head><body><div class="grid">`);
  listaFiltrada.forEach(p=>{
    win.document.write(`<div class="item">
      <img src="${qrUrl(p.id,200)}" crossorigin="anonymous">
      <div class="name">${p.nombre}</div>
      <div class="price">$${parseFloat(p.precio||0).toFixed(2)}</div>
    </div>`);
  });
  win.document.write('</div></body></html>');
  win.document.close();
  setTimeout(()=>win.print(), 1200);
}

cargarProductos();
</script>
</body>
</html>
