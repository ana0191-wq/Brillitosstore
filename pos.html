<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Brillitos POS">
<title>🌸 Brillitos POS</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --pink:#d63a8a;--pink-dark:#b5306e;--pink-light:#fdeef6;
  --pink-mid:#f2a8cc;--pink-pale:#fff0f8;
  --bg:#fdf6fb;--white:#fff;--text:#3d2040;--gray:#a08caa;--border:#f0dcea;
  --green:#5a9e6f;--green-light:#eaf4ee;
  --orange:#d4884a;--red:#c95c6e;--blue:#5a8fc7;
  --shadow:0 2px 12px rgba(214,58,138,.10);--radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Inter',system-ui,sans-serif}

/* ── LAYOUT DESKTOP ── */
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}

.app{
  display:flex;flex-direction:column;
  height:100vh;height:100dvh; /* dvh para móvil con barra del navegador */
  overflow:hidden;
}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;
  background:linear-gradient(135deg,var(--pink),var(--pink-dark));
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:52px;gap:8px;
  box-shadow:0 2px 12px rgba(214,58,138,.3);z-index:20;
}
.topbar-logo{font-size:17px;font-weight:800;color:white;white-space:nowrap}
.topbar-logo span{opacity:.75;font-size:12px;font-weight:500;margin-left:3px}
.topbar-bcv{font-size:11px;color:rgba(255,255,255,.9);background:rgba(255,255,255,.15);
  padding:3px 9px;border-radius:20px;white-space:nowrap;font-weight:600}
.topbar-actions{display:flex;gap:6px}
.topbar-btn{height:32px;padding:0 10px;border-radius:16px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.2);color:white;border:1.5px solid rgba(255,255,255,.3);white-space:nowrap}
.topbar-btn.scan-top{background:white;color:var(--pink);border-color:white}

/* ── SPLIT ── */
.split{
  flex:1;display:flex;overflow:hidden;
  min-height:0; /* crucial para que flex hijos no desborden */
}

/* ── PANEL PRODUCTOS ── */
.prods-panel{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;min-width:0;
}
.search-row{
  flex-shrink:0;padding:8px 10px 6px;
  display:flex;gap:7px;align-items:center;
  background:white;border-bottom:1.5px solid var(--border);
}
.search-input{
  flex:1;height:38px;border:1.5px solid var(--border);border-radius:20px;
  padding:0 14px;font-size:14px;outline:none;background:var(--bg);
  min-width:0;
}
.search-input:focus{border-color:var(--pink)}
.scan-fab{
  width:38px;height:38px;border-radius:19px;flex-shrink:0;
  background:var(--pink);color:white;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(214,58,138,.3);
}
.cats-scroll{
  flex-shrink:0;display:flex;gap:6px;overflow-x:auto;
  padding:7px 10px;background:white;
  border-bottom:1.5px solid var(--border);scrollbar-width:none;
}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-chip{
  padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);
  background:white;font-size:12px;font-weight:700;color:var(--gray);
  white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.cat-chip.active{background:var(--pink);color:white;border-color:var(--pink)}

.grid{
  flex:1;overflow-y:auto;padding:8px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:8px;align-content:start;
}

.pcard{
  background:white;border-radius:14px;padding:9px 8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  cursor:pointer;transition:transform .1s,box-shadow .1s;
  position:relative;-webkit-user-select:none;user-select:none;
}
.pcard:active{transform:scale(.95);box-shadow:0 1px 4px rgba(214,58,138,.1)}
.pcard.agotado{opacity:.45;pointer-events:none}
.pcard.incarrito{border-color:var(--pink);background:var(--pink-pale)}

.pcard-img{
  width:82px;height:82px;border-radius:10px;
  object-fit:cover;background:var(--pink-light);
  display:block;flex-shrink:0;
}
.pcard-ph{
  width:82px;height:82px;border-radius:10px;
  background:var(--pink-light);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;flex-shrink:0;
}
.pcard-nombre{
  font-size:11px;font-weight:700;text-align:center;
  color:var(--text);line-height:1.3;
  max-height:2.6em;overflow:hidden;width:100%;
}
.pcard-precio{font-size:14px;font-weight:800;color:var(--pink)}
.pcard-stock{font-size:10px;font-weight:600;padding:2px 6px;border-radius:7px}
.pcard-stock.ok{background:var(--green-light);color:var(--green)}
.pcard-stock.low{background:#fff3e0;color:var(--orange)}
.pcard-stock.out{background:#fdedf0;color:var(--red)}
.pcard-badge{
  position:absolute;top:5px;right:5px;
  background:var(--pink);color:white;font-size:10px;font-weight:800;
  min-width:20px;height:20px;border-radius:10px;padding:0 4px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(214,58,138,.4);
}

/* ── CARRITO PANEL ── */
.cart-panel{
  width:320px;flex-shrink:0;
  display:flex;flex-direction:column;overflow:hidden;
  background:white;border-left:1.5px solid var(--border);
}
.cart-head{
  flex-shrink:0;padding:11px 14px 9px;
  background:linear-gradient(135deg,var(--pink-pale),white);
  border-bottom:1.5px solid var(--border);
}
.cart-head-row{display:flex;justify-content:space-between;align-items:center}
.cart-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
.cart-count{background:var(--pink);color:white;font-size:11px;font-weight:800;
  padding:2px 8px;border-radius:10px}
.cart-clear{font-size:11px;color:var(--red);background:none;font-weight:700;
  padding:3px 8px;border-radius:8px;border:1px solid var(--red)}

.cart-cliente{flex-shrink:0;padding:6px 12px;border-bottom:1px solid var(--border)}
.cart-cliente input{
  width:100%;height:34px;border:1.5px solid var(--border);border-radius:20px;
  padding:0 12px;font-size:13px;outline:none;background:var(--bg);
}
.cart-cliente input:focus{border-color:var(--pink)}

.cart-items{flex:1;overflow-y:auto;padding:4px 8px;min-height:0}
.cart-empty{
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  color:var(--gray);
}
.cart-empty-icon{font-size:36px;opacity:.35}

.citem{
  display:flex;align-items:center;gap:8px;
  padding:7px 3px;border-bottom:1px solid var(--border);
}
.citem-img{
  width:38px;height:38px;border-radius:8px;
  object-fit:cover;background:var(--pink-light);flex-shrink:0;
}
.citem-info{flex:1;min-width:0}
.citem-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.citem-price{font-size:10px;color:var(--gray)}
.citem-ctrl{display:flex;align-items:center;gap:3px;flex-shrink:0}
.qty-btn{
  width:26px;height:26px;border-radius:7px;
  background:var(--pink-light);color:var(--pink-dark);
  font-size:15px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.qty-btn:active{background:var(--pink);color:white}
.qty-n{font-size:13px;font-weight:800;min-width:20px;text-align:center}
.citem-sub{font-size:12px;font-weight:800;color:var(--pink);flex-shrink:0;min-width:40px;text-align:right}

/* Descuento */
.cart-disc{
  flex-shrink:0;padding:5px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px;
}
.cart-disc label{font-size:11px;font-weight:700;color:var(--gray);white-space:nowrap}
.cart-disc input{
  flex:1;height:28px;border:1.5px solid var(--border);border-radius:8px;
  padding:0 8px;font-size:12px;outline:none;min-width:0;
}

/* Total */
.cart-total{flex-shrink:0;padding:9px 14px 6px;border-bottom:1px solid var(--border)}
.cart-total-row{display:flex;justify-content:space-between;align-items:baseline}
.ct-label{font-size:12px;color:var(--gray);font-weight:600}
.ct-val{font-size:22px;font-weight:800;color:var(--pink)}
.ct-bs{font-size:11px;color:var(--green);font-weight:600;margin-top:2px;text-align:right}

/* Métodos */
.cart-metodos{flex-shrink:0;padding:7px 12px;border-bottom:1px solid var(--border)}
.cart-metodos-lbl{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.metodos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.met-btn{
  padding:6px 3px;border-radius:9px;border:1.5px solid var(--border);
  background:white;font-size:10px;font-weight:700;color:var(--gray);
  text-align:center;line-height:1.3;transition:all .12s;
}
.met-btn.active{border-color:var(--pink);background:var(--pink-pale);color:var(--pink-dark)}
.met-emoji{display:block;font-size:15px;margin-bottom:1px}

/* Cuenta + Bs */
.cart-cuenta{flex-shrink:0;padding:4px 12px 6px;border-bottom:1px solid var(--border);display:none}
.cart-cuenta.show{display:block}
.cart-cuenta select{
  width:100%;height:32px;border:1.5px solid var(--border);border-radius:8px;
  padding:0 8px;font-size:12px;outline:none;background:var(--bg);
}
.cart-bs{flex-shrink:0;padding:4px 12px 7px;border-bottom:1px solid var(--border);display:none}
.cart-bs.show{display:block}
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.bs-field{display:flex;flex-direction:column;gap:2px}
.bs-field label{font-size:9px;font-weight:700;color:var(--gray);text-transform:uppercase}
.bs-field input{
  height:30px;border:1.5px solid var(--border);border-radius:8px;
  padding:0 7px;font-size:12px;font-weight:700;outline:none;background:var(--bg);
}
.bs-field input:focus{border-color:var(--green)}

/* Footer */
.cart-footer{flex-shrink:0;padding:8px 12px;background:white}
.cobrar-btn{
  width:100%;height:48px;border-radius:14px;
  background:linear-gradient(135deg,var(--pink),var(--pink-dark));
  color:white;font-size:16px;font-weight:800;
  box-shadow:0 4px 16px rgba(214,58,138,.35);transition:all .12s;
}
.cobrar-btn:active{transform:scale(.98)}
.cobrar-btn:disabled{opacity:.45;pointer-events:none}

/* También botón apartado */
.apt-btn{
  width:100%;height:36px;border-radius:10px;margin-bottom:6px;
  background:white;color:var(--pink);border:1.5px solid var(--pink-mid);
  font-size:13px;font-weight:700;
}

/* ══ MÓVIL ══ */
@media(max-width:640px){
  .cart-panel{
    width:100%;border-left:none;
    border-top:2px solid var(--border);
    max-height:44vh;
  }
  .split{flex-direction:column}
  .prods-panel{min-height:0;flex:1}
  .grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;padding:6px}
  .pcard-img,.pcard-ph{width:72px;height:72px}
  .topbar-bcv{display:none} /* ahorrar espacio en móvil */
}

/* ══ SCANNER ══ */
.scanner-ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.88);z-index:300;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.scanner-ov.open{display:flex}
#qr-reader-wrap{
  width:260px;height:260px;border-radius:18px;overflow:hidden;
  position:relative;background:#000;
}
/* Corners decorativos */
.qr-corner{position:absolute;width:28px;height:28px;border-color:var(--pink);border-style:solid;z-index:2}
.qr-corner.tl{top:8px;left:8px;border-width:3px 0 0 3px;border-radius:6px 0 0 0}
.qr-corner.tr{top:8px;right:8px;border-width:3px 3px 0 0;border-radius:0 6px 0 0}
.qr-corner.bl{bottom:8px;left:8px;border-width:0 0 3px 3px;border-radius:0 0 0 6px}
.qr-corner.br{bottom:8px;right:8px;border-width:0 3px 3px 0;border-radius:0 0 6px 0}
.qr-line{position:absolute;left:10px;right:10px;height:2px;background:var(--pink);
  opacity:.8;animation:scanLine 2s linear infinite;z-index:2}
@keyframes scanLine{0%{top:10px}100%{top:250px}}
#qr-reader-inner{position:absolute;inset:0}

.scan-status{
  color:white;font-size:13px;font-weight:600;text-align:center;
  padding:8px 18px;background:rgba(255,255,255,.1);border-radius:12px;max-width:290px;
}
.scan-status.ok{color:#a5d6a7;background:rgba(76,175,80,.2)}
.scan-status.err{color:#ef9a9a;background:rgba(244,67,54,.2)}
.scan-manual-row{display:flex;gap:7px}
.scan-manual-row input{
  height:38px;border-radius:10px;border:2px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.1);color:white;padding:0 12px;font-size:14px;
  outline:none;width:170px;
}
.scan-manual-row input::placeholder{color:rgba(255,255,255,.45)}
.scan-manual-row button{
  height:38px;padding:0 13px;border-radius:10px;
  background:var(--pink);color:white;font-size:13px;font-weight:700;
}
.scan-close{
  color:rgba(255,255,255,.65);font-size:13px;background:none;
  padding:7px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.2);
}

/* ══ MODALES ══ */
.modal-ov{
  display:none;position:fixed;inset:0;
  background:rgba(61,32,64,.5);z-index:400;
  align-items:center;justify-content:center;padding:16px;
}
.modal-ov.open{display:flex}
.modal-box{
  background:white;border-radius:22px;padding:24px 20px;
  max-width:360px;width:100%;
  box-shadow:0 20px 60px rgba(214,58,138,.2);text-align:center;
  max-height:90vh;overflow-y:auto;
}
.modal-ico{font-size:44px;margin-bottom:10px}
.modal-tit{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--gray);margin-bottom:16px;line-height:1.5}
.modal-items{
  background:var(--bg);border-radius:10px;padding:10px;margin-bottom:14px;
  font-size:12px;text-align:left;max-height:160px;overflow-y:auto;
}
.m-item-row{
  display:flex;justify-content:space-between;padding:3px 0;
  border-bottom:1px solid var(--border);
}
.m-item-row:last-child{border:none;font-weight:700;color:var(--pink);font-size:13px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;height:44px;border-radius:11px;font-size:14px;font-weight:700}
.modal-btn.sec{background:var(--pink-light);color:var(--pink-dark);border:1.5px solid var(--pink-mid)}
.modal-btn.pri{background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;
  box-shadow:0 4px 12px rgba(214,58,138,.3)}

/* Campos apartado */
.apt-field{display:flex;flex-direction:column;gap:3px;margin-bottom:9px;text-align:left}
.apt-field label{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase}
.apt-field input,.apt-field select{
  height:36px;border:1.5px solid var(--border);border-radius:9px;
  padding:0 11px;font-size:13px;outline:none;width:100%;
}
.apt-field input:focus{border-color:var(--pink)}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:72px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#3d2040;color:white;padding:9px 18px;
  border-radius:20px;font-size:13px;font-weight:600;
  z-index:500;opacity:0;transition:all .25s;
  pointer-events:none;white-space:nowrap;max-width:88vw;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ LOADING ══ */
.loading{
  position:fixed;inset:0;
  background:linear-gradient(135deg,var(--pink-pale),white);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:999;
}
.loading-logo{font-size:52px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.loading-txt{font-size:16px;font-weight:700;color:var(--pink)}
.loading-sub{font-size:13px;color:var(--gray)}
.spinner{width:32px;height:32px;border:3px solid var(--pink-light);
  border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="loading-logo">🌸</div>
  <div class="loading-txt">Brillitos POS</div>
  <div class="spinner"></div>
  <div class="loading-sub" id="loading-sub">Conectando...</div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">🌸 Brillitos <span>POS</span></div>
    <div class="topbar-bcv" id="bcv-badge">💱 Cargando...</div>
    <div class="topbar-actions">
      <button class="topbar-btn scan-top" onclick="abrirScanner()">📷 Scan</button>
      <button class="topbar-btn" onclick="window.location.href='admin.html'">⚙️</button>
    </div>
  </div>

  <!-- SPLIT -->
  <div class="split">

    <!-- PRODUCTOS -->
    <div class="prods-panel">
      <div class="search-row">
        <input class="search-input" id="search-inp" placeholder="🔍 Buscar..." oninput="filtrar()" autocomplete="off" autocorrect="off">
        <button class="scan-fab" onclick="abrirScanner()">📷</button>
      </div>
      <div class="cats-scroll" id="cats-bar"></div>
      <div class="grid" id="prod-grid"></div>
    </div>

    <!-- CARRITO -->
    <div class="cart-panel">
      <div class="cart-head">
        <div class="cart-head-row">
          <div class="cart-title">🛒 Carrito <span class="cart-count" id="cart-count">0</span></div>
          <button class="cart-clear" onclick="vaciar()">Vaciar</button>
        </div>
      </div>

      <div class="cart-cliente">
        <input id="inp-cliente" placeholder="👤 Cliente (opcional)" autocomplete="off">
      </div>

      <div class="cart-items" id="cart-items">
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          <div style="font-size:12px;font-weight:600">Toca un producto</div>
          <div style="font-size:11px">o escanea el QR</div>
        </div>
      </div>

      <div class="cart-disc">
        <label>💸 Desc. $</label>
        <input type="number" id="inp-desc" value="0" min="0" step="0.5" oninput="calcTotal()">
      </div>

      <div class="cart-total">
        <div class="cart-total-row">
          <span class="ct-label">TOTAL</span>
          <span class="ct-val" id="ct-val">$0.00</span>
        </div>
        <div class="ct-bs" id="ct-bs"></div>
      </div>

      <!-- MÉTODOS -->
      <div class="cart-metodos">
        <div class="cart-metodos-lbl">Método de pago</div>
        <div class="metodos-grid">
          <button class="met-btn active" onclick="selMet(this,'Pago Móvil')"><span class="met-emoji">📱</span>Pago Móvil</button>
          <button class="met-btn" onclick="selMet(this,'BCV')"><span class="met-emoji">🏦</span>BCV</button>
          <button class="met-btn" onclick="selMet(this,'Efectivo Bs')"><span class="met-emoji">💴</span>Ef. Bs</button>
          <button class="met-btn" onclick="selMet(this,'Efectivo $')"><span class="met-emoji">💵</span>Ef. $</button>
          <button class="met-btn" onclick="selMet(this,'Binance/USDT')"><span class="met-emoji">🔷</span>Binance</button>
          <button class="met-btn" onclick="selMet(this,'PayPal')"><span class="met-emoji">🅿️</span>PayPal</button>
        </div>
      </div>

      <div class="cart-cuenta" id="wrap-cuenta">
        <select id="sel-cuenta"><option value="">— Cuenta de cobro —</option></select>
      </div>

      <div class="cart-bs" id="wrap-bs">
        <div class="bs-grid">
          <div class="bs-field"><label>Tasa BCV</label>
            <input type="number" id="inp-tasa" step="0.01" placeholder="Ej: 480" oninput="calcBs()">
          </div>
          <div class="bs-field"><label>Monto Bs.</label>
            <input type="number" id="inp-bs" step="0.01" placeholder="Auto">
          </div>
        </div>
      </div>

      <div class="cart-footer">
        <button class="apt-btn" onclick="abrirApartado()">📌 Guardar como apartado</button>

// ══ CONFIG ══
const SB  = 'https://xavqokyzdmqzguicjsrq.supabase.co';

const CUENTAS = [
  {id:'bancaamiga_luisma',label:'BancaAmiga Luisma',tipo:'Pago Móvil'},

];

// ══ ESTADO ══
let prods=[], carrito=[], bcv=0, metodo='Pago Móvil', cat='Todas';
let scanner=null, scanActivo=false, scanLock=false, lastCode=null, pendiente=null;

// ══ HELPERS ══
const $=id=>document.getElementById(id);
function hoy(){ const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()-240); return d.toISOString().slice(0,10); }
function codProd(id){ return 'BRILL-'+id; }
function toast(msg,ms=2600){
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
    o.start();o.stop(ctx.currentTime+.15);
  }catch(e){}
}

// ══ SUPABASE ══
async function GET(t,q){ const r=await fetch(`${SB}/rest/v1/${t}?${q}`,{headers:H}); return r.ok?r.json():[]; }
async function POST(t,d){ const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(d)}); return r.json(); }
async function PATCH(t,id,d){ await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...H,Prefer:'return=minimal'},body:JSON.stringify(d)}); }

// ══ INIT ══
async function init(){
  $('loading-sub').textContent='Cargando productos...';
  try{
    // FIX: query correcta de supabase — filtros con & no con &
    const data = await GET('productos','select=*&order=id.desc&limit=500');
    prods = Array.isArray(data) ? data.filter(p=>p.activo!==false) : [];
    $('loading-sub').textContent='Cargando tasa BCV...';

      const r=await fetch('https://ve.dolarapi.com/v1/dolares/oficial',{signal:AbortSignal.timeout(6000)});

    if(bcv>0){
      $('bcv-badge').textContent='💱 Bs. '+bcv.toFixed(2);
      $('inp-tasa').value=bcv.toFixed(2);
    } else {
      $('bcv-badge').textContent='💱 Sin tasa';
    }
    renderCats();
    renderProds();

    $('loading').style.display='none';

  }catch(e){
    $('loading-sub').textContent='❌ Error: '+e.message;
    console.error(e);
  }
}

// ══ CATEGORÍAS ══
function renderCats(){
  const cats=['Todas',...new Set(prods.map(p=>(p.categoria||'').trim()).filter(Boolean))].sort((a,b)=>a==='Todas'?-1:b==='Todas'?1:a.localeCompare(b));
  $('cats-bar').innerHTML=cats.map(c=>`<button class="cat-chip${c===cat?' active':''}" onclick="selCat(this,'${c.replace(/'/g,"&#39;")}')">${c}</button>`).join('');
}
function selCat(el,c){
  cat=c;
  document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderProds();
}

// ══ PRODUCTOS ══
function renderProds(){
  const q=$('search-inp').value.toLowerCase().trim();
  let lista=[...prods];
  if(cat!=='Todas') lista=lista.filter(p=>(p.categoria||'').trim()===cat);
  if(q) lista=lista.filter(p=>(p.nombre||'').toLowerCase().includes(q));
  lista.sort((a,b)=>{
    if(a.es_nuevo&&!b.es_nuevo) return -1;
    if(!a.es_nuevo&&b.es_nuevo) return 1;
    return (b.id||0)-(a.id||0);
  });

  const g=$('prod-grid');
  if(!lista.length){ g.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--gray);padding:24px;font-size:13px">Sin productos 🌸</div>'; return; }

  g.innerHTML=lista.map(p=>{
    const stk=parseInt(p.stock||0);
    const enc=carrito.find(x=>x.id===p.id);
    const foto=p.imagen||p.foto||(Array.isArray(p.imagenes)?p.imagenes[0]:'')||'';
    const imgHtml=foto
      ?`<img class="pcard-img" src="${foto}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'pcard-ph',textContent:'🌸'}))">`
      :`<div class="pcard-ph">🌸</div>`;
    const stockHtml=stk<=0
      ?'<span class="pcard-stock out">Agotado</span>'
      :stk<=3?`<span class="pcard-stock low">Últimos ${stk}</span>`
      :`<span class="pcard-stock ok">${stk}</span>`;
    const badge=enc?`<div class="pcard-badge">${enc.cantidad}</div>`:'';
    return `<div class="pcard${stk<=0?' agotado':''}${enc?' incarrito':''}" onclick="agregar(${p.id})">
      ${badge}
      ${imgHtml}
      <div class="pcard-nombre">${p.nombre||''}</div>
      <div class="pcard-precio">$${parseFloat(p.precio||0).toFixed(2)}</div>
      ${stockHtml}
    </div>`;
  }).join('');
}
function filtrar(){ renderProds(); }

// ══ CARRITO ══
function agregar(pid){
  const p=prods.find(x=>x.id===pid); if(!p) return;
  const stk=parseInt(p.stock||0);
  const i=carrito.findIndex(x=>x.id===pid);
  if(i>=0){
    if(carrito[i].cantidad>=stk&&stk>0){ toast('⚠️ Stock máximo'); return; }
    carrito[i].cantidad++;
    carrito[i].sub=carrito[i].cantidad*carrito[i].precio;
  } else {
    if(stk<=0){ toast('⚠️ Agotado'); return; }
    carrito.push({id:pid,nombre:p.nombre,precio:parseFloat(p.precio||0),cantidad:1,sub:parseFloat(p.precio||0),foto:p.imagen||p.foto||''});
  }
  if(navigator.vibrate) navigator.vibrate(25);
  renderCarrito(); renderProds();
}

function chgQty(i,d){
  if(!carrito[i]) return;
  const p=prods.find(x=>x.id===carrito[i].id);
  const stk=p?parseInt(p.stock||0):999;
  carrito[i].cantidad+=d;
  if(carrito[i].cantidad<=0) carrito.splice(i,1);
  else {
    if(carrito[i].cantidad>stk&&stk>0){ carrito[i].cantidad=stk; toast('⚠️ Stock máximo'); }
    carrito[i].sub=carrito[i].cantidad*carrito[i].precio;
  }
  renderCarrito(); renderProds();
}

function vaciar(){ carrito=[]; renderCarrito(); renderProds(); }

function renderCarrito(){
  const cnt=carrito.reduce((s,i)=>s+i.cantidad,0);
  $('cart-count').textContent=cnt;
  const el=$('cart-items');
  if(!carrito.length){
    el.innerHTML='<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div style="font-size:12px;font-weight:600">Toca un producto</div><div style="font-size:11px">o escanea el QR</div></div>';
    calcTotal(); return;
  }
  el.innerHTML=carrito.map((it,i)=>{
    const imgHtml=it.foto
      ?`<img class="citem-img" src="${it.foto}" loading="lazy" onerror="this.style.background='var(--pink-light)'">`
      :`<div class="citem-img" style="display:flex;align-items:center;justify-content:center;font-size:16px">🌸</div>`;
    return `<div class="citem">
      ${imgHtml}
      <div class="citem-info">
        <div class="citem-name">${it.nombre}</div>
        <div class="citem-price">$${it.precio.toFixed(2)}</div>
      </div>
      <div class="citem-ctrl">
        <button class="qty-btn" onclick="chgQty(${i},-1)">−</button>
        <span class="qty-n">${it.cantidad}</span>
        <button class="qty-btn" onclick="chgQty(${i},1)">+</button>
      </div>
      <div class="citem-sub">$${it.sub.toFixed(2)}</div>
    </div>`;
  }).join('');
  calcTotal();
}

function calcTotal(){
  const sub=carrito.reduce((s,i)=>s+i.sub,0);
  const desc=parseFloat($('inp-desc').value)||0;
  const total=Math.max(0,sub-desc);
  $('ct-val').textContent='$'+total.toFixed(2);
  const btn=$('cobrar-btn');
  btn.textContent='💳 Cobrar $'+total.toFixed(2);
  btn.disabled=carrito.length===0;
  calcBs();
}

function calcBs(){
  const sub=carrito.reduce((s,i)=>s+i.sub,0);
  const desc=parseFloat($('inp-desc').value)||0;
  const total=Math.max(0,sub-desc);
  const esBs=['Pago Móvil','BCV','Efectivo Bs'].includes(metodo);
  if(esBs){
    const tasa=parseFloat($('inp-tasa').value)||bcv||0;
    if(tasa>0){
      const bs=total*tasa;
      $('ct-bs').textContent='≈ Bs. '+bs.toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2})+' ('+tasa.toFixed(2)+')';
      $('inp-bs').value=bs.toFixed(2);
    }
  } else { $('ct-bs').textContent=''; }
}

// ══ MÉTODOS ══
function selMet(el, m){
  metodo=m;
  document.querySelectorAll('.met-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  const esBs=['Pago Móvil','BCV','Efectivo Bs'].includes(m);
  $('wrap-bs').classList.toggle('show',esBs);
  if(esBs&&bcv>0) $('inp-tasa').value=bcv.toFixed(2);
  poblarCuentas(m);
  calcTotal();
}

function poblarCuentas(m){
  const met=m||metodo;
  const lista=CUENTAS.filter(c=>c.tipo===met);
  const wrap=$('wrap-cuenta');
  if(lista.length){
    $('sel-cuenta').innerHTML='<option value="">— Cuenta de cobro —</option>'+lista.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
    wrap.classList.add('show');
  } else {
    $('sel-cuenta').innerHTML='<option value="">— No aplica —</option>';
    wrap.classList.remove('show');
  }
}

// ══ CONFIRMAR COBRO ══
function confirmar(){
  if(!carrito.length){ toast('⚠️ Carrito vacío'); return; }
  const sub=carrito.reduce((s,i)=>s+i.sub,0);
  const desc=parseFloat($('inp-desc').value)||0;
  const total=Math.max(0,sub-desc);
  const esBs=['Pago Móvil','BCV','Efectivo Bs'].includes(metodo);
  const tasa=parseFloat($('inp-tasa').value)||bcv||0;
  const bs=parseFloat($('inp-bs').value)||0;
  const cliente=$('inp-cliente').value.trim()||'Cliente POS';
  const cuenta=$('sel-cuenta').value;

  $('mc-tit').textContent='Cobro a '+cliente;
  $('mc-sub').innerHTML='<strong>$'+total.toFixed(2)+'</strong> vía '+metodo+
    (esBs&&bs>0?'<br><span style="color:var(--green)">Bs. '+bs.toLocaleString('es-VE',{minimumFractionDigits:2})+'</span>':'');
  $('mc-items').innerHTML=
    carrito.map(it=>`<div class="m-item-row"><span>${it.nombre} ×${it.cantidad}</span><span>$${it.sub.toFixed(2)}</span></div>`).join('')+
    (desc>0?`<div class="m-item-row"><span>Descuento</span><span style="color:var(--green)">−$${desc.toFixed(2)}</span></div>`:'')+
    `<div class="m-item-row"><span>TOTAL</span><span>$${total.toFixed(2)}</span></div>`;

  pendiente={total,sub,desc,esBs,tasa,bs,cliente,cuenta,metodo};
  $('modal-confirm').classList.add('open');
}

async function ejecutarCobro(){
  if(!pendiente) return;
  const btn=$('mc-ok'); btn.disabled=true; btn.textContent='⏳...';
  const {total,sub,desc,esBs,tasa,bs,cliente,cuenta,metodo:met}=pendiente;
  try{
    const data={
      cliente_nombre:cliente,canal:'POS',metodo_pago:met,
      estado:'Pagado',subtotal:sub,costo_envio:0,descuento:desc,total,
      fecha_venta:hoy(),
      tasa_bcv_usada:esBs?tasa:0,
      monto_bs:esBs?bs:0,
      moneda_pago:esBs?'Bs':'USD',
      cuenta_cobro:cuenta||null,
      numero:'POS-'+Date.now()
    };
    const res=await POST('ventas',data);
    const vid=res[0]&&res[0].id;
    if(!vid) throw new Error('Sin ID de venta');
    for(const it of carrito){
      await fetch(`${SB}/rest/v1/venta_items`,{method:'POST',headers:H,
        body:JSON.stringify({venta_id:vid,producto_id:it.id,producto_nombre:it.nombre,
          precio_unitario:it.precio,cantidad:it.cantidad,subtotal:it.sub})});
      const p=prods.find(x=>x.id===it.id);
      if(p&&parseInt(p.stock||0)>0){
        const ns=Math.max(0,p.stock-it.cantidad);
        await PATCH('productos',p.id,{stock:ns});
        p.stock=ns;
      }
    }
    $('modal-confirm').classList.remove('open');
    beep();
    $('mok-sub').innerHTML=
      cliente+'<br><strong>$'+total.toFixed(2)+'</strong> · '+met+
      (esBs&&bs>0?'<br><span style="color:var(--green)">Bs. '+bs.toLocaleString('es-VE',{minimumFractionDigits:2})+'</span>':'')+
      '<br><span style="font-size:11px;color:var(--gray)">'+carrito.map(i=>i.nombre+' ×'+i.cantidad).join(' · ')+'</span>';
    $('modal-ok').classList.add('open');
    renderProds();
  }catch(e){
    toast('❌ '+e.message,4000);
    btn.disabled=false; btn.textContent='✅ Confirmar';
  }
}

function nuevaVenta(){
  carrito=[];
  $('inp-cliente').value='';
  $('inp-desc').value='0';
  pendiente=null;
  $('modal-ok').classList.remove('open');
  renderCarrito(); renderProds();
  toast('✅ Nueva venta 🌸');
}

function waRecibo(){
  if(!pendiente) return;
  const {total,esBs,bs,tasa,metodo:met,cliente}=pendiente;
  let msg=`🌸 *Brillitos Store*\n✅ Venta confirmada\n👤 ${cliente}\n💳 ${met}\n`;
  if(esBs&&bs>0) msg+=`💴 Bs. ${bs.toLocaleString('es-VE',{minimumFractionDigits:2})} (tasa ${tasa.toFixed(2)})\n`;
  msg+=`💵 Total: $${total.toFixed(2)}\n\n`;
  carrito.forEach(it=>{ msg+=`· ${it.nombre} ×${it.cantidad} — $${it.sub.toFixed(2)}\n`; });
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

// ══ APARTADO ══
function abrirApartado(){
  if(!carrito.length){ toast('⚠️ Carrito vacío'); return; }
  $('apt-cli').value=$('inp-cliente').value;
  const d=new Date(); d.setDate(d.getDate()+7);
  $('apt-fecha').value=d.toISOString().slice(0,10);
  $('modal-apt').classList.add('open');
}

async function guardarApartado(){
  const cli=$('apt-cli').value.trim();
  if(!cli){ toast('⚠️ Ingresa nombre del cliente'); return; }
  const total=carrito.reduce((s,i)=>s+i.sub,0);
  const abono=parseFloat($('apt-abono').value)||0;
  try{
    const res=await POST('apartados',{
      cliente_nombre:cli,total,abono,
      fecha_entrega:$('apt-fecha').value,
      notas:$('apt-notas').value,
      estado:'Pendiente',canal:'POS'
    });
    const aid=res[0]&&res[0].id;
    if(aid){
      for(const it of carrito){
        await fetch(`${SB}/rest/v1/apartado_items`,{method:'POST',headers:H,
          body:JSON.stringify({apartado_id:aid,producto_id:it.id,producto_nombre:it.nombre,
            precio_unitario:it.precio,cantidad:it.cantidad,subtotal:it.sub})});
      }
    }
    $('modal-apt').classList.remove('open');
    toast('📌 Apartado guardado para '+cli+' 🌸');
    carrito=[]; renderCarrito(); renderProds();
  }catch(e){ toast('❌ '+e.message); }
}

// ══ SCANNER ══
function abrirScanner(){
  if(typeof Html5Qrcode==='undefined'){ toast('⚠️ Scanner no cargó'); return; }
  if(scanner){ try{scanner.stop().catch(()=>{});}catch(e){} scanner=null; }
  $('scan-ov').classList.add('open');
  $('scan-status').textContent='📷 Apunta al QR del producto';
  $('scan-status').className='scan-status';
  $('inp-manual').value='';
  scanActivo=true; scanLock=false; lastCode=null;
  // Limpiar inner
  const inner=$('qr-reader-inner');
  inner.innerHTML='';
  scanner=new Html5Qrcode('qr-reader-inner');
  scanner.start(
    {facingMode:'environment'},
    {fps:5,qrbox:{width:200,height:200},
     formatsToSupport:[Html5QrcodeSupportedFormats.QR_CODE]},
    onScan,
    ()=>{}
  ).catch(err=>{
    $('scan-status').textContent='⚠️ Sin acceso a cámara — usa código manual';
    $('scan-status').className='scan-status err';
    console.warn('Scanner error:',err);
  });
}

function cerrarScanner(){
  scanActivo=false;
  $('scan-ov').classList.remove('open');
  if(scanner){
    scanner.stop().catch(()=>{});
    scanner=null;
  }
}

function onScan(decoded){
  if(!scanActivo||scanLock) return;
  if(decoded===lastCode) return;
  // LOCK inmediato
  scanActivo=false; scanLock=true; lastCode=decoded;
  cerrarScanner();
  setTimeout(()=>{ scanLock=false; lastCode=null; },3000);

  const p=prods.find(x=>codProd(x.id)===decoded||String(x.id)===decoded||(x.codigo&&x.codigo===decoded));
  if(p&&p.activo!==false){
    beep(); agregar(p.id); toast('✅ '+p.nombre+' 🌸');
  } else if(p){
    toast('⚠️ Producto inactivo');
  } else {
    toast('❓ No encontrado: '+decoded);
  }
}

function buscarManual(){
  const v=$('inp-manual').value.trim();
  if(!v) return;
  onScan(v);
}

init();
</script>
